name: Build DunUnlocker APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 자바(JDK) 17 환경 세팅
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: APK 파일 빌드 (컴파일 진행)
      run: ./gradlew assembleDebug

    - name: 완성된 APK 파일 업로드
      uses: actions/upload-artifact@v4
      with:
        name: DunUnlocker-APK
        path: app/build/outputs/apk/debug/*.apk
