name: Build DunUnlocker APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 자바(JDK) 17 세팅
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Shizuku 기반 빌드 환경 구성 (안전한 우회 방식)
      run: |
        cat << 'EOF' >> app/build.gradle.kts
        
        dependencies {
            compileOnly("dev.rikka.shizuku:api:13.1.0")
            compileOnly("dev.rikka.shizuku:provider:13.1.0")
            compileOnly("dev.rikka.hidden:stub:4.3.0")
        }
        EOF

    - name: 이전 빌드의 잘못된 잔재 초기화 (에러 방지)
      run: git checkout app/build.gradle.kts || true
        
    - name: Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: APK 파일 빌드 (컴파일 진행)
      run: ./gradlew assembleDebug

    - name: 완성된 APK 다운로드 파일 생성
      uses: actions/upload-artifact@v4
      with:
        name: DunUnlocker-APK
        path: app/build/outputs/apk/debug/*.apk
