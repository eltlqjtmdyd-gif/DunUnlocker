name: Build DunUnlocker APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 자바(JDK) 17 환경 세팅
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: 숨겨진 API 저장소 통째로 복제 (가짜 파일 문제 원천 차단)
      run: |
        # 1. 원본 개발자가 언급한 JetpackDuba 저장소(또는 예비 저장소)를 통째로 가져옵니다.
        git clone --depth 1 https://github.com/JetpackDuba/android-jar-with-hidden-api.git hidden-api-repo || git clone --depth 1 https://github.com/anggrayudi/android-hidden-api.git hidden-api-repo
        cd hidden-api-repo
        
        # 2. 가져온 저장소 내에서 가장 최신 버전의 API 폴더를 자동으로 찾습니다.
        API_VER=$(ls -d */ | grep -oE 'android-[0-9]+' | grep -oE '[0-9]+' | sort -n | tail -1)
        echo "=> 안전하게 확보된 숨겨진 API 버전: $API_VER"
        
        # 3. 해당 버전의 안드로이드 플랫폼을 설치합니다.
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-$API_VER" > /dev/null
        
        # 4. 방금 통째로 복사해서 얻어낸 진짜 'android.jar' 파일로 강제 덮어씌웁니다.
        rm -f $ANDROID_HOME/platforms/android-$API_VER/android.jar
        cp android-$API_VER/android.jar $ANDROID_HOME/platforms/android-$API_VER/android.jar
        
        # 5. 폴더를 빠져나와 원본 앱 소스코드의 버전을 일치시킵니다.
        cd ..
        sed -i -E "s/compileSdk\s*=\s*[0-9]+/compileSdk = $API_VER/g" app/build.gradle.kts
        sed -i -E "s/targetSdk\s*=\s*[0-9]+/targetSdk = $API_VER/g" app/build.gradle.kts

    - name: 캐시 초기화 및 권한 부여
      run: |
        chmod +x gradlew
        ./gradlew clean

    - name: APK 파일 빌드 (컴파일 진행)
      run: ./gradlew assembleDebug --no-daemon

    - name: 완성된 APK 다운로드 파일 생성
      uses: actions/upload-artifact@v4
      with:
        name: DunUnlocker-APK
        path: app/build/outputs/apk/debug/*.apk
