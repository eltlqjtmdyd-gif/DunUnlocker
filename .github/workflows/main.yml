name: Build DunUnlocker APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 자바(JDK) 환경 세팅 (API 35 대응)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: 숨겨진 API 우회 라이브러리 정상 주입 (줄바꿈 수정)
      run: |
        echo "" >> app/build.gradle.kts
        echo "dependencies {" >> app/build.gradle.kts
        echo "    compileOnly(\"dev.rikka.hidden:stub:4.3.0\")" >> app/build.gradle.kts
        echo "}" >> app/build.gradle.kts

    - name: Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: APK 파일 빌드 (컴파일 진행)
      run: ./gradlew assembleDebug

    - name: 완성된 APK 파일 업로드
      uses: actions/upload-artifact@v4
      with:
        name: DunUnlocker-APK
        path: app/build/outputs/apk/debug/*.apk
