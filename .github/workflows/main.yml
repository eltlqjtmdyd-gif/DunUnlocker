name: Build DunUnlocker APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 자바(JDK) 17 세팅
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: 확실한 빌드를 위한 API 버전 강제 다운그레이드 (35 -> 34)
      run: |
        sed -i 's/compileSdk = 35/compileSdk = 34/g' app/build.gradle.kts
        sed -i 's/targetSdk = 35/targetSdk = 34/g' app/build.gradle.kts

    - name: Android API 34 플랫폼 설치
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"

    - name: 검증된 숨겨진 API(android.jar) 강제 덮어쓰기 (정석 방식)
      run: |
        rm -f $ANDROID_HOME/platforms/android-34/android.jar
        wget -qO $ANDROID_HOME/platforms/android-34/android.jar https://github.com/anggrayudi/android-hidden-api/raw/master/android-34/android.jar

    - name: 빌드 에러 방지를 위한 권한 부여 및 클린업
      run: |
        chmod +x gradlew
        ./gradlew clean

    - name: APK 파일 빌드 (컴파일 진행)
      run: ./gradlew assembleDebug

    - name: 완성된 APK 다운로드 파일 생성
      uses: actions/upload-artifact@v4
      with:
        name: DunUnlocker-APK
        path: app/build/outputs/apk/debug/*.apk
