name: Build DunUnlocker APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스 코드 가져오기
      uses: actions/checkout@v4

    - name: 자바(JDK) 17 환경 세팅
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: 소스코드 버전을 34로 강제 하향 (버전 충돌 방지)
      run: |
        sed -i -E 's/compileSdk\s*=\s*[0-9]+/compileSdk = 34/g' app/build.gradle.kts
        sed -i -E 's/targetSdk\s*=\s*[0-9]+/targetSdk = 34/g' app/build.gradle.kts

    - name: 순정 Android API 34 플랫폼 설치
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"

    - name: 숨겨진 API(android.jar) 다운로드 및 강제 덮어쓰기 (3중 백업)
      run: |
        rm -f $ANDROID_HOME/platforms/android-34/android.jar
        
        # 파일이 확실히 살아있는 깃허브 직통 주소 3곳
        URLS=(
          "https://raw.githubusercontent.com/Reginer/aosp-android-jar/master/android-34/android.jar"
          "https://raw.githubusercontent.com/Reginer/aosp-android-jar/main/android-34/android.jar"
          "https://raw.githubusercontent.com/sable/android-platforms/master/android-34/android.jar"
        )
        
        SUCCESS=0
        for url in "${URLS[@]}"; do
          echo "다운로드 시도 중: $url"
          if wget -qO $ANDROID_HOME/platforms/android-34/android.jar "$url"; then
            # 파일 용량이 비정상적(1MB 이하)이면 LFS 포인터이거나 오류이므로 무시하고 다음 링크로 넘어감
            FILESIZE=$(stat -c%s "$ANDROID_HOME/platforms/android-34/android.jar")
            if [ "$FILESIZE" -gt 1000000 ]; then
              echo "다운로드 성공! (크기: $FILESIZE 바이트)"
              SUCCESS=1
              break
            else
              echo "다운로드 되었으나 파일이 너무 작음. 다음 링크 시도..."
            fi
          fi
        done
        
        if [ "$SUCCESS" -eq 0 ]; then
          echo "모든 링크에서 다운로드 실패"
          exit 1
        fi

    - name: 빌드 클린업 및 권한 부여
      run: |
        chmod +x gradlew
        ./gradlew clean

    - name: APK 파일 빌드 (컴파일 진행)
      run: ./gradlew assembleDebug

    - name: 완성된 APK 다운로드 파일 생성
      uses: actions/upload-artifact@v4
      with:
        name: DunUnlocker-APK
        path: app/build/outputs/apk/debug/*.apk
